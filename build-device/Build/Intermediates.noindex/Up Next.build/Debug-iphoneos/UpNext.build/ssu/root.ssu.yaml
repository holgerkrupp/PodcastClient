apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: de.holgerkrupp.PodcastClient
    intents:
    - metadata:
        name: BookmarkCurrentPlaybackIntent_0
        title: Bookmark This
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Bookmark this in ${+applicationName}'
          - '{${+prefix} }Save a bookmark in ${+applicationName}'
          - '{${+prefix} }Bookmark the current position in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Bookmark this in ${+applicationName}'
          - '{${+prefix} }Save a bookmark in ${+applicationName}'
          - '{${+prefix} }Bookmark the current position in ${+applicationName}'
    - metadata:
        name: ResumePlaybackIntent_1
        title: Resume Playback
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Resume playback in ${+applicationName}'
          - '{${+prefix} }Play last episode in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Resume playback in ${+applicationName}'
          - '{${+prefix} }Play last episode in ${+applicationName}'
    - metadata:
        name: PausePlaybackIntent_2
        title: Pause Playback
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Pause playback in ${+applicationName}'
          - '{${+prefix} }Pause ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Pause playback in ${+applicationName}'
          - '{${+prefix} }Pause ${+applicationName}'
    - metadata:
        name: SkipForwardIntent_3
        title: Skip Forward
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Skip forward in ${+applicationName}'
          - '{${+prefix} }Jump ahead in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Skip forward in ${+applicationName}'
          - '{${+prefix} }Jump ahead in ${+applicationName}'
    - metadata:
        name: SkipBackwardIntent_4
        title: Skip Backward
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Skip back in ${+applicationName}'
          - '{${+prefix} }Jump back in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Skip back in ${+applicationName}'
          - '{${+prefix} }Jump back in ${+applicationName}'
    - metadata:
        name: PlayFirstUpNextIntent_5
        title: Play Up Next
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Play Up Next in ${+applicationName}'
          - '{${+prefix} }Start Up Next in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Play Up Next in ${+applicationName}'
          - '{${+prefix} }Start Up Next in ${+applicationName}'
    - metadata:
        name: PlayNextUpNextIntent_6
        title: Play Next Up Next Episode
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Play next episode in ${+applicationName}'
          - '{${+prefix} }Play what''s next in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Play next episode in ${+applicationName}'
          - '{${+prefix} }Play what''s next in ${+applicationName}'
    - metadata:
        name: MoveCurrentEpisodeToEndIntent_7
        title: Move Current To End
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Move this episode to the end in ${+applicationName}'
          - '{${+prefix} }Send current episode to the end in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Move this episode to the end in ${+applicationName}'
          - '{${+prefix} }Send current episode to the end in ${+applicationName}'
    - metadata:
        name: RemoveCurrentFromUpNextIntent_8
        title: Remove Current From Up Next
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Remove this from Up Next in ${+applicationName}'
          - '{${+prefix} }Remove current episode in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Remove this from Up Next in ${+applicationName}'
          - '{${+prefix} }Remove current episode in ${+applicationName}'
    - metadata:
        name: GeneratePodcastShareImageIntent_9
        title: Generate Podcast Share Image
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }Generate podcast share image in ${+applicationName}'
          - '{${+prefix} }Create podcast stats image in ${+applicationName}'
        - locale: en
          utterances:
          - '{${+prefix} }Generate podcast share image in ${+applicationName}'
          - '{${+prefix} }Create podcast stats image in ${+applicationName}'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: de
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: de
    synomyms:
    - Up Next
  - locale: en
    synomyms:
    - Up Next
- name: PodcastShareShortcutPeriod
  type: ssu/parameter
  definitions:
  - locale: de
    synomyms:
    - Tag
    - Woche
    - Monat
    - Jahr
    - Forever
  - locale: en
    synomyms:
    - Day
    - Week
    - Month
    - Year
    - Forever
- name: PodcastShareShortcutTiming
  type: ssu/parameter
  definitions:
  - locale: de
    synomyms:
    - Aktueller Zeitraum
    - Vorheriger Zeitraum
  - locale: en
    synomyms:
    - Current Period
    - Previous Period
- name: PodcastShareShortcutDesign
  type: ssu/parameter
  definitions:
  - locale: de
    synomyms:
    - Podium Top 3
    - Billboard Top 10
    - Cover-Raster
    - Cover-Collage
    - Cover-Wolke
    - Wiedergabezeit-Balken
    - Wiedergabezeit-Kreis
    - Jahresrückblick
    - Calendar
    - Year Calendar
  - locale: en
    synomyms:
    - Podium Top 3
    - Billboard Top 10
    - Cover Grid
    - Cover Collage
    - Cover Cloud
    - Playtime Bars
    - Playtime Pie
    - Stats Wrapped
    - Calendar
    - Year Calendar
- name: PodcastShareShortcutBackground
  type: ssu/parameter
  definitions:
  - locale: de
    synomyms:
    - Automatisch für Zeitraum
    - Langweilig
    - Regenbogen
    - 45-Grad-Verlauf
    - Weiß
    - Schwarz
    - Januar
    - Februar
    - März
    - April
    - Mai
    - Juni
    - Juli
    - August
    - September
    - Oktober
    - November
    - Dezember
    - Neujahr
    - Karneval
    - Weihnachten
    - Ostern
    - Ramadan
    - Eid al-Fitr
    - Chanukka
    - Holi
    - Diwali
    - Mondneujahr
    - Mittsommer
    - Halloween
  - locale: en
    synomyms:
    - Automatic for Period
    - Boring
    - Rainbow
    - 45 Gradient
    - White
    - Black
    - January
    - February
    - March
    - April
    - May
    - June
    - July
    - August
    - September
    - October
    - November
    - December
    - New Year
    - Carnival
    - Christmas
    - Easter
    - Ramadan
    - Eid al-Fitr
    - Hanukkah
    - Holi
    - Diwali
    - Lunar New Year
    - Midsummer
    - Halloween
- name: PodcastShareShortcutAspectRatio
  type: ssu/parameter
  definitions:
  - locale: de
    synomyms:
    - Hochformat
    - Quadratisch
    - Querformat
  - locale: en
    synomyms:
    - Portrait
    - Square
    - Landscape
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: de
    synomyms:
      $ref: ssu://Resources/prefix/de.yaml
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: de
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/de.yaml
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
